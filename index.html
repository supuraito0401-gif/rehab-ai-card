<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>リハAIカルテ</title>

<style>
body{
 background:#0f172a;
 color:#e5e7eb;
 font-family:-apple-system;
 margin:0;
}

.container{
 padding:16px;
 max-width:600px;
 margin:auto;
}

input,textarea,select{
 width:100%;
 padding:12px;
 margin-bottom:12px;
 background:#1f2933;
 border:none;
 color:white;
 border-radius:10px;
}

button{
 width:100%;
 padding:12px;
 margin-top:6px;
 border:none;
 border-radius:10px;
 color:white;
 background:#374151;
}

.primary{background:#2563eb;}
.record{background:#ef4444;}

.card{
 background:#1f2937;
 padding:12px;
 border-radius:10px;
 margin-top:12px;
}

.rehab-item{
 display:flex;
 gap:10px;
 padding:8px 0;
}
</style>
</head>

<body>

<div class="container">

<h2>リハAIカルテ（音声×雛形）</h2>

<input id="patientName" placeholder="患者名">

<select id="disease">
<option value="">疾患選択</option>
<option>膝OA</option>
<option>腰痛</option>
<option>脳梗塞</option>
</select>

<textarea id="subjective" placeholder="S（主訴）"></textarea>

<h4>🎤 音声入力</h4>
<button class="record" onclick="toggleRecording()">録音開始 / 停止</button>
<textarea id="voiceText" placeholder="音声結果"></textarea>

<h4>実施内容</h4>
<div id="treatments"></div>

<button class="primary" onclick="generate()">AI生成</button>

<div id="output"></div>

</div>

<script>
// 疾患テンプレ
const templates={
 "膝OA":{
  O:"膝関節に疼痛あり。可動域制限を認める。",
  A:"筋力低下およびROM制限により機能低下。",
  P:"筋力強化・ROM改善継続。"
 },
 "腰痛":{
  O:"腰部疼痛あり。体幹筋低下。",
  A:"体幹支持性低下による疼痛持続。",
  P:"体幹トレーニング継続。"
 },
 "脳梗塞":{
  O:"片麻痺あり。バランス低下。",
  A:"運動麻痺によりADL制限。",
  P:"歩行・バランス訓練継続。"
 }
};

// リハ項目
const rehabList=[
"ROM訓練","筋力強化","歩行訓練","バランス訓練","ストレッチ","関節モビ"
];

rehabList.forEach(r=>{
 treatments.innerHTML+=`
 <div class="rehab-item">
 <input type="checkbox" value="${r}">
 <span>${r}</span>
 </div>`;
});

// 音声認識
let recognition;
let recording=false;

function toggleRecording(){
 if(!('webkitSpeechRecognition'in window)){
  alert("音声未対応");
  return;
 }

 if(!recording){
  recognition=new webkitSpeechRecognition();
  recognition.lang="ja-JP";
  recognition.continuous=true;

  recognition.onresult=(e)=>{
   let text="";
   for(let i=0;i<e.results.length;i++){
    text+=e.results[i][0].transcript;
   }
   voiceText.value=text;
  };

  recognition.start();
  recording=true;
 }else{
  recognition.stop();
  recording=false;
 }
}

// 簡易AI（ここがキモ）
function summarize(text){
 let result="";

 if(text.includes("膝")) result+="膝関節に関する訴えあり。";
 if(text.includes("痛")) result+="疼痛あり。";
 if(text.includes("曲")) result+="可動域改善傾向。";
 if(text.includes("硬")) result+="筋緊張高い。";

 return result;
}

// 生成
function generate(){
 let disease=diseaseSelect.value;
 let temp=templates[disease]||{};

 let selected=[...document.querySelectorAll("input[type=checkbox]:checked")].map(c=>c.value);

 let voice=voiceText.value;
 let summary=summarize(voice);

 let O=(temp.O||"")+" "+summary+" "+selected.join("、")+"実施。";

 let A=temp.A||"評価中";
 let P=temp.P||"継続予定";

 output.innerHTML=`
 <div class="card">
 <div contenteditable="true"><b>S</b>: ${subjective.value}</div>
 <div contenteditable="true"><b>O</b>: ${O}</div>
 <div contenteditable="true"><b>A</b>: ${A}</div>
 <div contenteditable="true"><b>P</b>: ${P}</div>
 </div>
 `;
}
</script>

</body>
</html>
