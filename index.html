<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>リハAIカルテ</title>

<style>
body{background:#121212;color:#e0e0e0;font-family:sans-serif;margin:0;}
.container{padding:16px;max-width:700px;margin:auto;}

.header{
 display:flex;align-items:center;justify-content:space-between;
 margin-bottom:10px;
}
.menu-btn{font-size:24px;cursor:pointer;}

.menu{
 position:fixed;top:0;left:-250px;width:250px;height:100%;
 background:#1e1e1e;padding:16px;transition:0.3s;
}
.menu.open{left:0;}

input,textarea,select{
 width:100%;padding:10px;margin-bottom:10px;
 background:#1e1e1e;border:1px solid #333;color:white;border-radius:6px;
}

button{
 width:100%;padding:10px;margin-top:6px;
 background:#2a2a2a;border:none;color:white;border-radius:6px;
}
.primary{background:#4da3ff;}

.card{
 background:#1e1e1e;padding:10px;margin:10px 0;border-radius:6px;
}

.title{font-weight:bold;margin-bottom:4px;}
.small{font-size:12px;color:#aaa;}

.rehab-item{
 display:flex;justify-content:space-between;align-items:center;
 margin-bottom:6px;
}
</style>
</head>

<body>

<div class="menu" id="menu">
<h3>メニュー</h3>
<input id="search" placeholder="患者検索">
<button onclick="render()">全件表示</button>
</div>

<div class="container">

<div class="header">
<div class="menu-btn" onclick="toggleMenu()">☰</div>
<h2>リハAIカルテ</h2>
</div>

<input id="patientName" placeholder="患者名">

<select id="therapist">
<option value="">実施者選択</option>
<option>田中</option>
<option>佐藤</option>
<option>山本</option>
</select>

<div id="date"></div>

<textarea id="subjective" placeholder="S（主訴）"></textarea>

<h4>実施内容</h4>
<div id="treatments"></div>

<button onclick="startRecording()">録音開始</button>
<button onclick="stopRecording()">停止</button>

<textarea id="voiceInput" placeholder="音声入力"></textarea>
<textarea id="manualO" placeholder="O追記"></textarea>

<button class="primary" onclick="generateSOAP()">AI生成</button>

<div id="output"></div>

<button onclick="saveRecord()">保存</button>

<h3>患者一覧</h3>
<div id="patients"></div>

<h3>カルテ一覧</h3>
<div id="records"></div>

</div>

<script>
const today=new Date().toLocaleDateString();
date.textContent=today;

// メニュー
function toggleMenu(){
 menu.classList.toggle("open");
}

// リハ項目
const rehabList=[
"ROM訓練","筋力強化","ストレッチ","歩行訓練","バランス訓練",
"立ち上がり","ADL訓練","神経筋再教育","物理療法","リラクゼーション","関節モビ"
];

rehabList.forEach(r=>{
 treatments.innerHTML+=`
 <div class="rehab-item">
  <span>${r}</span>
  <input type="checkbox" value="${r}">
 </div>`;
});

// 音声
let recognition;
if('webkitSpeechRecognition'in window){
 recognition=new webkitSpeechRecognition();
 recognition.lang='ja-JP';
 recognition.continuous=true;
 recognition.onresult=e=>{
  let t="";
  for(let i=e.resultIndex;i<e.results.length;i++){
   t+=e.results[i][0].transcript;
  }
  voiceInput.value=t;
 };
}
function startRecording(){recognition.start();}
function stopRecording(){recognition.stop();}

// AI生成
function generateSOAP(){
 let name=patientName.value;
 let therapistVal=therapist.value;
 let S=subjective.value;
 let voice=voiceInput.value;
 let manual=manualO.value;

 let selected=[...document.querySelectorAll("input[type=checkbox]:checked")].map(c=>c.value);

 let O=selected.join("、")+"実施。";
 if(voice.includes("膝")) O+="膝関節アプローチ。";
 if(manual) O+=manual;

 let A="改善傾向あり。";
 let P="継続予定。";

 let summary=O.slice(0,30);

 output.innerHTML=`
 <div class="card">
 <div class="small">${name} / ${therapistVal} / ${today}</div>
 <div><b>S</b>: ${S}</div>
 <div><b>O</b>: ${O}</div>
 <div><b>A</b>: ${A}</div>
 <div><b>P</b>: ${P}</div>
 </div>
 `;

 output.dataset.summary=summary;
}

// 保存
function saveRecord(){
 let records=JSON.parse(localStorage.getItem("records")||"[]");
 let patientsList=JSON.parse(localStorage.getItem("patients")||"[]");

 let name=patientName.value;
 let therapistVal=therapist.value;

 if(!patientsList.includes(name)){
  patientsList.push(name);
  localStorage.setItem("patients",JSON.stringify(patientsList));
 }

 records.push({
  name,
  therapist:therapistVal,
  date:today,
  summary:output.dataset.summary,
  full:output.innerHTML
 });

 localStorage.setItem("records",JSON.stringify(records));
 render();
}

// 表示
function render(){
 let records=JSON.parse(localStorage.getItem("records")||"[]");
 let patientsList=JSON.parse(localStorage.getItem("patients")||"[]");

 let keyword=search.value||"";

 patients.innerHTML="";
 patientsList.forEach(p=>{
  if(p.includes(keyword)){
   patients.innerHTML+=`<div class="card" onclick="showPatient('${p}')">${p}</div>`;
  }
 });

 records.innerHTML="";
}

// 患者別
function showPatient(name){
 let records=JSON.parse(localStorage.getItem("records")||"[]");

 let html="";
 records.filter(r=>r.name===name).forEach(r=>{
  html+=`
  <div class="card">
   <div class="small">${r.date} / ${r.therapist}</div>
   <div>${r.summary}</div>
   <button onclick='showDetail(${JSON.stringify(r.full)})'>詳細</button>
  </div>`;
 });

 recordsDiv=document.getElementById("records");
 recordsDiv.innerHTML=html;
}

// 詳細
function showDetail(content){
 records.innerHTML=content;
}

render();
</script>

</body>
</html>
