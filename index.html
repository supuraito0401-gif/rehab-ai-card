<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>リハAIカルテ</title>

<style>
body{
 background:#0f172a;
 color:#e5e7eb;
 font-family:-apple-system;
 margin:0;
}

.menu{
 position:fixed;
 top:0;
 left:-100%;
 width:260px;
 height:100%;
 background:#111827;
 padding:16px;
 transition:0.3s;
 z-index:1000;
}
.menu.open{left:0;}

.overlay{
 position:fixed;
 top:0;
 left:0;
 width:100%;
 height:100%;
 background:rgba(0,0,0,0.5);
 display:none;
 z-index:999;
}
.overlay.show{display:block;}

.container{
 padding:16px;
 max-width:600px;
 margin:auto;
}

.header{
 display:flex;
 justify-content:space-between;
 align-items:center;
}

.menu-btn{
 font-size:26px;
 cursor:pointer;
}

input,textarea,select{
 width:100%;
 padding:12px;
 margin-bottom:12px;
 background:#1f2933;
 border:none;
 color:white;
 border-radius:10px;
 font-size:16px;
}

button{
 width:100%;
 padding:12px;
 margin-top:6px;
 background:#374151;
 border:none;
 color:white;
 border-radius:10px;
}

.primary{background:#2563eb;}
.save{background:#10b981;}
.delete{background:#ef4444;}
.edit{background:#f59e0b;}

.card{
 background:#1f2937;
 padding:12px;
 margin:12px 0;
 border-radius:10px;
}

.small{
 font-size:12px;
 color:#9ca3af;
}

.rehab-item{
 display:flex;
 align-items:center;
 gap:10px;
 padding:10px 0;
 border-bottom:1px solid #374151;
}
</style>
</head>

<body>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<div class="menu" id="menu">
<h3>検索</h3>
<input id="search" placeholder="患者名検索">
<button onclick="render();closeMenu()">全件表示</button>
</div>

<div class="container">

<div class="header">
<div class="menu-btn" onclick="openMenu()">☰</div>
<h2>リハAIカルテ</h2>
</div>

<input id="patientName" placeholder="患者名">

<select id="therapist">
<option value="">実施者選択</option>
<option>田中</option>
<option>佐藤</option>
<option>山本</option>
</select>

<div id="date"></div>

<textarea id="subjective" placeholder="S（主訴）"></textarea>

<h4>実施内容</h4>
<div id="treatments"></div>

<textarea id="voiceInput" placeholder="音声・入力"></textarea>
<textarea id="manualO" placeholder="O追記"></textarea>

<button class="primary" onclick="generateSOAP()">AI生成</button>

<div id="output"></div>

<button class="save" onclick="saveRecord()">保存</button>
<div id="status"></div>

<h3>患者一覧</h3>
<div id="patients"></div>

<h3>カルテ一覧</h3>
<div id="records"></div>

</div>

<script>
const today=new Date().toLocaleDateString();
date.textContent=today;

// メニュー
function openMenu(){
 menu.classList.add("open");
 overlay.classList.add("show");
}
function closeMenu(){
 menu.classList.remove("open");
 overlay.classList.remove("show");
}

// リハ項目
const rehabList=[
"ROM訓練","筋力強化","ストレッチ","歩行訓練","バランス訓練",
"立ち上がり","ADL訓練","神経筋再教育","物理療法","リラクゼーション","関節モビ"
];

rehabList.forEach(r=>{
 treatments.innerHTML+=`
 <div class="rehab-item">
   <input type="checkbox" value="${r}">
   <span>${r}</span>
 </div>`;
});

// AI風生成
function generateSOAP(){
 let name=patientName.value;
 let therapistVal=therapist.value;
 let S=subjective.value;
 let voice=voiceInput.value;
 let manual=manualO.value;

 let selected=[...document.querySelectorAll("input[type=checkbox]:checked")].map(c=>c.value);

 let O=selected.join("、")+"実施。";
 if(voice.includes("膝")) O+="膝アプローチ。";
 if(manual) O+=manual;

 let A="改善傾向あり。";
 let P="継続予定。";

 let summary=O.slice(0,30);

 output.innerHTML=`
 <div class="card">
 <div class="small">${name} / ${therapistVal} / ${today}</div>
 <div contenteditable="true"><b>S</b>: ${S}</div>
 <div contenteditable="true"><b>O</b>: ${O}</div>
 <div contenteditable="true"><b>A</b>: ${A}</div>
 <div contenteditable="true"><b>P</b>: ${P}</div>
 </div>
 `;
 output.dataset.summary=summary;
}

// 保存
function saveRecord(){
 status.textContent="保存中...";

 setTimeout(()=>{
  let records=JSON.parse(localStorage.getItem("records")||"[]");

  records.push({
   name:patientName.value,
   therapist:therapist.value,
   date:today,
   summary:output.dataset.summary,
   full:output.innerHTML
  });

  localStorage.setItem("records",JSON.stringify(records));

  status.textContent="保存完了";
  render();
 },500);
}

// 患者一覧
function renderPatients(){
 let recordsData = JSON.parse(localStorage.getItem("records")||"[]");

 let patientsList = [...new Set(recordsData.map(r=>r.name))];

 let keyword=search.value||"";

 patients.innerHTML="";

 patientsList.forEach(name=>{
  if(name.includes(keyword)){
   patients.innerHTML+=`
   <div class="card" onclick="showPatient('${name}')">
     ${name}
   </div>`;
  }
 });
}

// 患者ごとカルテ
function showPatient(name){
 let recordsData=JSON.parse(localStorage.getItem("records")||"[]");

 let filtered=recordsData.filter(r=>r.name===name);

 records.innerHTML="";

 filtered.forEach((r,i)=>{
  let index=recordsData.indexOf(r);

  records.innerHTML+=`
  <div class="card">
    <div class="small">${r.date} / ${r.therapist}</div>
    <div>${r.summary}</div>

    <button onclick="showDetail(${index})">詳細</button>
    <button class="edit" onclick="editRecord(${index})">編集</button>
    <button class="delete" onclick="deleteRecord(${index})">削除</button>
  </div>`;
 });
}

// 詳細
function showDetail(i){
 let data=JSON.parse(localStorage.getItem("records"));
 records.innerHTML=`<div class="card">${data[i].full}</div>`;
}

// 削除
function deleteRecord(i){
 let data=JSON.parse(localStorage.getItem("records"));
 data.splice(i,1);
 localStorage.setItem("records",JSON.stringify(data));
 render();
}

// 編集
function editRecord(i){
 let data=JSON.parse(localStorage.getItem("records"));
 output.innerHTML=data[i].full;
}

// 全体描画
function render(){
 renderPatients();
 records.innerHTML="";
}

render();
</script>

</body>
</html>
